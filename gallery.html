  <script>
  document.addEventListener("DOMContentLoaded", function () {
    const hasGSAP = typeof gsap !== "undefined" && typeof ScrollTrigger !== "undefined";
    if (hasGSAP) {
      gsap.registerPlugin(ScrollTrigger);
    }
    function debounce(fn, delay) { let t; return function () { clearTimeout(t); t = setTimeout(fn, delay); }; }

    function bindFancyboxSafe() {
      if (typeof Fancybox === "undefined") return false;
      Fancybox.unbind("[data-fancybox]");
      Fancybox.bind("[data-fancybox]", {
        Thumbs: { showOnStart: false },
        Toolbar: { display: { left: [], middle: [], right: ["close"] } }
      });
      return true;
    }

    // Fancybox can arrive late due to defer/lazy loading.
    if (!bindFancyboxSafe()) {
      let tries = 0;
      const maxTries = 20;
      const timer = setInterval(() => {
        tries += 1;
        if (bindFancyboxSafe() || tries >= maxTries) clearInterval(timer);
      }, 150);
    }

    /* ── Gallery Filter Logic ── */
    const filterBtns = document.querySelectorAll(".gallery-filter-btn");
    const galleryItems = document.querySelectorAll(".gallery-item");

    function applyFilter(filter) {
      // Update buttons
      filterBtns.forEach((b) => b.classList.remove("active"));
      const activeBtn = document.querySelector(`.gallery-filter-btn[data-filter="${filter}"]`);
      if (activeBtn) activeBtn.classList.add("active");

      // Save to localStorage
      // localStorage.setItem("activeGalleryFilter", filter);

      // Filter items & update Fancybox groups
      galleryItems.forEach((item) => {
        if (filter === "all" || item.dataset.category === filter) {
          item.style.display = "";
          item.setAttribute("data-fancybox", "gallery");
          if (hasGSAP) {
            gsap.fromTo(item, { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.4, ease: "power2.out" });
          } else {
            item.style.opacity = "1";
            item.style.transform = "none";
          }
        } else {
          item.style.display = "none";
          item.removeAttribute("data-fancybox");
        }
      });

      // Rebind Fancybox to only include visible items
      bindFancyboxSafe();
    }

    // Attach click events
    filterBtns.forEach((btn) => {
      btn.addEventListener("click", function () {
        applyFilter(this.dataset.filter);
      });
    });

    if (hasGSAP) {
      window.addEventListener("resize", debounce(() => { ScrollTrigger.refresh(); }, 300));
    }
  });
  </script>
