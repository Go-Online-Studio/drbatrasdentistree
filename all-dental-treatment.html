<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />

  <!-- Bootstrap 5 -->

  <!-- Custom CSS -->

<body class="loading">

  <!-- Preloader -->
  <div id="preloader">
    <div class="loader-content">
      <div class="preloader-spinner"></div>
      <p class="loader-text">Dr. Batra's Dentistree</p>
    </div>
  </div>

  <!-- Custom Cursor -->
  <div class="custom-cursor"></div>

  <!-- Navbar (injected by critical.js) -->
  <header id="mainNavbar"></header>

  <!-- Page Hero -->
  <section class="page-hero">
    <div class="container">
      <span class="section-subtitle reveal-item">
        <iconify-icon icon="ph:list-checks"></iconify-icon> Dental Services
      </span>
      <h1 class="reveal-item">All Dental Treatment</h1>
      <div class="breadcrumb-nav reveal-item">
        <a href="index.html">Home</a>
        <span class="separator">&#8250;</span>
        <span>All Dental Treatment</span>
      </div>
    </div>
  </section>

  <!-- Services Grid -->
  <section class="services-section spacer-y" id="services" style="background: var(--bg-soft);">

      <!-- Services Grid — DESKTOP/TABLET -->
      <div class="row grid" id="servicesGrid"></div>

      <!-- Services Swiper — MOBILE ONLY -->
      <div class="services-mobile-swiper-wrap" id="servicesMobileWrap">

          <div class="swiper-wrapper" id="servicesMobileWrapper"></div>
          <div class="swiper-pagination services-mobile-pagination"></div>
        </div>
      </div>
    </div>

      <h2 class="reveal-item" id="ctaHeading">Ready to Get Started?</h2>
      <p class="section-desc reveal-item" id="ctaDesc" style="color:rgba(255,255,255,0.8);max-width:560px;margin:0 auto 32px;">

      </p>
      <a href="contact.html" class="btn-white reveal-item" id="ctaButton">

  <script>
    window.CATEGORY_FILTER = "dental-services";

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="js/critical.js"></script>
  <script src="js/category-services.js"></script>
